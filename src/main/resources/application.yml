# ============================================================
# LegacyVault 后端配置文件
# ============================================================
server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: legacy-vault-backend

  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${LEGACY_VAULT_DB_URL:jdbc:mysql://192.168.1.5:3306/legacy_vault?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${LEGACY_VAULT_DB_USERNAME:tlmall}
    password: ${LEGACY_VAULT_DB_PASSWORD:tlmall123}

  # Redis配置
  redis:
    host: ${LEGACY_VAULT_REDIS_HOST:192.168.1.5}
    port: ${LEGACY_VAULT_REDIS_PORT:6379}
    password: ${LEGACY_VAULT_REDIS_PASSWORD:}
    database: ${LEGACY_VAULT_REDIS_DATABASE:0}
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# LegacyVault自定义配置
legacy-vault:
  # 全局Mock模式开关（true=使用Mock数据，false=调用真实接口）
  mock-mode-enabled: ${LEGACY_VAULT_MOCK_MODE:true}
  # JWT配置
  jwt:
    secret: ${LEGACY_VAULT_JWT_SECRET:LegacyVault_JWT_Secret_Key_2026_MOCK_ONLY}
    expire-hours: ${LEGACY_VAULT_JWT_EXPIRE_HOURS:24}
  # 心跳配置
  heartbeat:
    default-period-days: 90
    grace-period-hours: 72
  # 触发验证配置
  trigger:
    contact-check-hours: 24
    notary-notify-hours: 24
    min-confirm-count: 2
  # 交付链接配置
  delivery:
    link-expire-days: 7
    max-fail-count: 3
  # TOTP配置
  totp:
    issuer: LegacyVault
  # 加密配置
  crypto:
    pbkdf2-iterations: 310000
  # 文件存储路径（Mock阶段使用本地存储）
  storage:
    local-path: ./uploads/encrypted

# 日志配置
logging:
  level:
    com.legacyvault: debug
    com.legacyvault.mock: info
